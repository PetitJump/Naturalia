<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecologic — Inscription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .nav-retour {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 600;
            text-decoration: none;
            color: var(--terre);
            font-family: var(--font-corps);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }
        .nav-retour:hover { color: var(--foret); }

        .auth-form {
            background: var(--papier);
            padding: 40px;
            border-left: 4px solid var(--foret);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.12);
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.1);
            font-family: var(--font-titre);
        }
        .auth-links { margin-top: 20px; font-size: 13px; color: var(--terre); }
        .error-msg { color: #b22222; background: #fdf2f2; padding: 10px; font-size: 13px; margin-bottom: 20px; border: 1px solid #f8d7da; }
    </style>
</head>
<body>
    <div class="cadre"></div>
    <a href="/" class="nav-retour">← Accueil</a>

    <canvas id="particules"></canvas>

    <div class="page">
        <div class="entete a1">
            <img src="{{ url_for('static', filename='Ecologic.png') }}" alt="Logo Naturalia">
            <span class="label-petit">Rejoindre l'aventure</span>
        </div>

        <div class="auth-form a2">
            <h1 class="titre-hero" style="font-size: 32px; margin-bottom: 20px;">Créer un compte</h1>

            {% if erreur %}
                <div class="error-msg">{{ erreur }}</div>
            {% endif %}

            <form method="post">
                <input type="text" name="username" class="auth-input" placeholder="Nom d'utilisateur" required>
                <input type="password" name="password" class="auth-input" placeholder="Mot de passe" required>
                <button type="submit" class="btn btn-principal" style="width: 100%; border:none;">S'inscrire</button>
            </form>

            <div class="auth-links">
                Déjà inscrit ? <a href="/login" style="color: var(--foret); font-weight: bold;">Se connecter</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='particules.js') }}"></script>
</body>
</html>
